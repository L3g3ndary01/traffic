<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Traffic Safety Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
overflow:hidden;
}

.header{
position:fixed;
top:0;
width:100%;
background:#b71c1c;
padding:12px;
font-size:20px;
z-index:10;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:700px;
text-align:center;
}

#answers{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-top:20px;
}

button{
padding:12px 18px;
margin:8px;
font-size:16px;
background:#fbc02d;
border:none;
border-radius:6px;
cursor:pointer;
}

.correct{background:green !important;}
.wrong{background:red !important;}

canvas{
display:none;
position:fixed;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:45vw;
height:90vh;
background:#222;
border:2px solid white;
}
</style>
</head>

<body>

<div class="header">🚦 مدرسة سميسمة الثانوية للبنين</div>

<div class="container">
<h2 id="q"></h2>
<div id="answers"></div>
</div>

<canvas id="game"></canvas>

<audio id="crash" src="https://www.soundjay.com/mechanical/sounds/crash-1.mp3"></audio>

<script>

// ================= QUIZ =================

let questions=[
{q:"مسافة الأمان الطبيعية؟",a:["5-10 م","20 م","50 م","100 م"],c:0},
{q:"ماذا تعني الإشارة الحمراء؟",a:["توقف","سرعة","تجاوز","انعطاف"],c:0},
{q:"ما هي 'المسافة الزمنية' الدنيا الموصى بها لترك مسافة أمان خلف المركبة الأمامية في الظروف الجوية المثالية؟",a:["خمس ثواني","ثانيتان","عشر ثواني","ثانية واحدة"],c:1},
{q:"قرب المدارس؟",a:["20-40","50-80","100-120","عدم العبور من هناك"],c:0},
{q:"في حالة الانزلاق المائي (Hydroplaning) حيث تفقد الإطارات تلامسها مع الطريق بسبب المياه، ما هو الإجراء الصحيح والأكثر أماناً؟",a:["رفع القدم عن دواسة الوقود وتوجيه المقود ببطء في اتجاه الانزلاق","زيادة السرعة لتجاوز المنطقة المبتلة بسرعة","الضغط بقوة على الفرامل لإيقاف السيارة فوراً","استخدام فرامل اليد لتقليل السرعة تدريجياً"],c:0},
{q:"عند اقترابك من تقاطع طرق غير محكم (لا توجد به إشارات أو لوحات) وتصل مركبتان في نفس الوقت، لمن تكون الأولوية؟",a:["للمركبة القادمة من جهة اليمين","للمركبة القادمة من جهة اليسار","للمركبة الأكبر حجماً","للمركبة التي تسير بسرعة أكبر"],c:0},
{q:"أثناء القيادة على طريق سريع، انفجر أحد الإطارات الخلفية فجأة. ما هو التصرف الأكثر أماناً للسيطرة على المركبة؟",a:["الإمساك بالمقود بقوة والحفاظ على مسار مستقيم مع تخفيف السرعة تدريجياً","توجيه السيارة بسرعة نحو كتف الطريق الأيمن","تحويل ناقل الحركة إلى الوضع المحايد (N) فوراً","الضغط بقوة على المكابح لإيقاف السيارة في أسرع وقت"],c:0},
{q:"ما المقصود بمصطلح 'القيادة الدفاعية' (Defensive Driving)؟",a:["توقع أخطاء الآخرين والتفاعل معها مسبقاً لتجنب الحوادث","استخدام أنظمة الحماية في السيارة مثل الوسائد الهوائية","القيادة ببطء شديد دائماً لتجنب المخالفات","الدفاع عن مسارك ومنع الآخرين من التجاوز أمامك"],c:0},
{q:"متى يجب عليك استخدام إشارات الانعطاف (الغمازات) أثناء القيادة؟",a:["عند تغيير المسار، أو الانعطاف، أو الدخول والخروج من الدوار، وفي كل وقت تنوي فيه تغيير اتجاهك","فقط في حالات القيادة الليلية لتوضيح الرؤية للآخرين","ليس ضرورياً إذا كنت تقود بسرعة بطيئة جداً","فقط عندما تكون هناك سيارات أخرى خلفك مباشرة"],c:0},
{q:"كيف يجب التعامل عند العبور من منحنى حاد؟",a:["تخفيف السرعة قبل دخول المنحنى، ثم الحفاظ على سرعة ثابتة، وزيادتها تدريجياً عند الخروج","الانعطاف بأقصى زاوية ممكنة للمقود من بداية المنحنى لتقصير المسافة","الضغط بقوة على المكابح (الفرامل) أثناء الانعطاف الحاد لتجنب الانزلاق"," زيادة السرعة داخل المنحنى لزيادة قوة الطرد المركزي وتثبيت السيارة"],c:0}
];

let i=0,score=0;
let currentLevel=2;
let gameOver=false;

// 🔀 خلط الإجابات
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// ================= QUIZ =================

function loadQ(){
let q=questions[i];

document.getElementById("q").innerHTML=q.q;

// نجهز الإجابات
let options=q.a.map((text,idx)=>({
text:text,
idx:idx
}));

// نخلط أماكن العرض (وليس صحة الإجابة)
options.sort(()=>Math.random()-0.5);

let html="";

options.forEach(opt=>{
html+=`<button onclick="pick(${opt.idx},this)">${opt.text}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function pick(ans,btn){
let buttons=document.querySelectorAll("button");

if(ans===questions[i].c){
score++;
btn.classList.add("correct");
}else{
btn.classList.add("wrong");
buttons[questions[i].c].classList.add("correct");
}

buttons.forEach(b=>b.disabled=true);

setTimeout(()=>{
i++;
if(i<questions.length) loadQ();
else showLevelSelect();
},500);
}

loadQ();


// ================= LEVEL SELECT =================

function showLevelSelect(){
document.querySelector(".container").innerHTML=`
<h2>🎚️ Choose Level</h2>

<button onclick="startGame(1)">Easy</button>
<button onclick="startGame(2)">Medium</button>
<button onclick="startGame(3)">Hard 🔥</button>
`;
}


// ================= GAME =================

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth*0.45;
canvas.height=window.innerHeight;
}
resize();

window.addEventListener("resize",resize);

let playerImg=new Image();
playerImg.src="mycar.png";

let enemyImg=new Image();
enemyImg.src="car5.webp";

let player,cars,scoreGame,speed;

// ================= KEYBOARD FIX =================

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.x-=18;
if(e.key==="ArrowRight") player.x+=18;

// ENTER = restart
if(e.key==="Enter" && gameOver){
startGame(currentLevel);
}

// SPACE = change level
if(e.code==="Space" && gameOver){
e.preventDefault();
showLevelSelect();
}
});

// ================= START =================

function startGame(level){

currentLevel=level;
gameOver=false;

document.querySelector(".container").style.display="none";
canvas.style.display="block";

player={
x:canvas.width/2,
y:canvas.height-130,
w:60,
h:110
};

cars=[];
scoreGame=0;

if(level===1) speed=6;
if(level===2) speed=8;
if(level===3) speed=11;

loop();
}

function spawn(){
if(Math.random()<0.05){
cars.push({
x:Math.random()*(canvas.width-70),
y:-120,
w:60,
h:110
});
}
}

function drawRoad(){
ctx.fillStyle="#444";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawPlayer(){
ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);
}

function drawCars(){
cars.forEach(c=>{
ctx.drawImage(enemyImg,c.x,c.y,c.w,c.h);
});
}

function update(){
cars.forEach(c=>{
c.y+=speed;

if(
player.x<c.x+c.w &&
player.x+player.w>c.x &&
player.y<c.y+c.h &&
player.y+player.h>c.y
){
gameOver=true;
document.getElementById("crash").play();
}
});

if(!gameOver) scoreGame++;
}

function drawScore(){
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+scoreGame,15,30);
}


// ================= GAME OVER =================

function gameOverScreen(){
ctx.fillStyle="rgba(0,0,0,0.85)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="40px Arial";
ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2-60);

ctx.font="25px Arial";
ctx.fillText("Score: "+scoreGame,canvas.width/2,canvas.height/2);

ctx.font="18px Arial";
ctx.fillText("Press ENTER to restart",canvas.width/2,canvas.height/2+50);

}

// ================= LOOP =================

function loop(){
if(gameOver){
gameOverScreen();
return;
}

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRoad();
drawPlayer();
spawn();
drawCars();
update();
drawScore();

requestAnimationFrame(loop);
}

</script>

</body>
</html>
